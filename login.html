<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Login — TETRISCX</title>
</head>
<body>
    <div class="top-bar" id="navbar"></div>

    <div class="content">
        <h2>Login</h2>
        <div id="error-message" style="color: #ff6b6b; margin-bottom: 10px; display: none;"></div>
        <div class="login-form">
            <form id="login-form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required><br><br>
                <input type="submit" value="Login">
            </form>
        </div>
    </div>

    <div class="footer">
        <p>Created by: Christopher Shen</p>
        <a href="https://github.com/ChrissyAFK/TETRISCX"><i class="fa fa-github" style="font-size:36px;color:#1b145c;"></i></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                return;
            }

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
